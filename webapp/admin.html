<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>XazDent Admin</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

:root{
  --bg:#05050f;
  --bg2:#0a0a1a;
  --card:rgba(0,255,159,0.04);
  --neon1:#00ff9f;
  --neon2:#ff00ff;
  --neon3:#00d4ff;
  --neon4:#ffff00;
  --text:#e0ffe0;
  --hint:#4a7a5a;
  --border:rgba(0,255,159,0.2);
  --border2:rgba(0,212,255,0.2);
  --red:#ff3366;
  --green:#00ff9f;
  --amber:#ffcc00;
  --glow1:0 0 10px rgba(0,255,159,0.5);
  --glow2:0 0 10px rgba(255,0,255,0.5);
  --glow3:0 0 10px rgba(0,212,255,0.5);
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

body{
  font-family:'Share Tech Mono',monospace;
  background:var(--bg);
  color:var(--text);
  padding-bottom:20px;
  min-height:100vh;
  overflow-x:hidden;
}

/* Scanline effect */
body::before{
  content:'';position:fixed;inset:0;z-index:999;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,transparent,transparent 2px,
    rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px
  );
}

/* Grid background */
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,255,159,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,255,159,0.03) 1px,transparent 1px);
  background-size:40px 40px;
}

/* HEADER */
.hdr{
  background:rgba(0,0,0,0.8);
  border-bottom:1px solid var(--neon1);
  box-shadow:var(--glow1);
  padding:10px 14px;
  position:sticky;top:0;z-index:100;
}
.hdr-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hdr-title{
  font-family:'Orbitron',monospace;
  font-size:14px;font-weight:900;
  color:var(--neon1);
  text-shadow:var(--glow1);
  letter-spacing:2px;
}
.hdr-badge{
  font-size:10px;color:var(--neon3);
  border:1px solid var(--neon3);
  padding:2px 8px;border-radius:2px;
  box-shadow:var(--glow3);
  animation:pulse 2s infinite;
}

/* COUNTDOWN */
.countdown{
  display:flex;gap:8px;align-items:center;
  font-family:'Orbitron',monospace;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(0,212,255,0.3);
  border-radius:4px;padding:6px 10px;
  box-shadow:inset 0 0 20px rgba(0,212,255,0.05);
}
.cd-label{font-size:9px;color:var(--hint);letter-spacing:1px;margin-bottom:2px}
.cd-val{font-size:18px;font-weight:700;color:var(--neon3);text-shadow:var(--glow3);line-height:1}
.cd-unit{text-align:center}
.cd-sep{font-size:16px;color:var(--neon2);align-self:flex-start;margin-top:10px}

/* NAV */
.nav{
  display:flex;flex-wrap:wrap;gap:3px;padding:8px;
  background:rgba(0,0,0,0.7);
  border-bottom:1px solid var(--border);
  position:sticky;top:94px;z-index:99;
}
.nb{
  padding:5px 10px;border:1px solid var(--border);
  border-radius:2px;font-size:10px;font-weight:600;
  cursor:pointer;background:transparent;
  color:var(--hint);white-space:nowrap;
  font-family:'Share Tech Mono',monospace;
  transition:all .2s;letter-spacing:1px;
}
.nb:hover{color:var(--neon1);border-color:var(--neon1);box-shadow:var(--glow1)}
.nb.on{
  background:rgba(0,255,159,0.1);
  color:var(--neon1);border-color:var(--neon1);
  box-shadow:var(--glow1),inset 0 0 10px rgba(0,255,159,0.1);
}
.nb.drag-over{border:1px dashed var(--neon2)}

/* PAGES */
.pg{display:none;padding:12px;position:relative;z-index:1}
.pg.on{display:block}

/* CARDS */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px}
.grid4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:10px}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:4px;padding:12px;
  position:relative;overflow:hidden;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon1),transparent);
}
.card.full{grid-column:1/-1}

.clabel{font-size:10px;color:var(--hint);margin-bottom:4px;letter-spacing:1px}
.cval{font-size:20px;font-weight:700;font-family:'Orbitron',monospace}
.csub{font-size:10px;color:var(--hint);margin-top:3px}
.cval.green{color:var(--neon1);text-shadow:var(--glow1)}
.cval.blue{color:var(--neon3);text-shadow:var(--glow3)}
.cval.amber{color:var(--amber);text-shadow:0 0 10px rgba(255,204,0,0.5)}
.cval.red{color:var(--red);text-shadow:0 0 10px rgba(255,51,102,0.5)}
.cval.purple{color:var(--neon2);text-shadow:var(--glow2)}

/* MCARD */
.mcard{background:var(--card);border:1px solid var(--border);border-radius:4px;
  padding:10px;text-align:center;position:relative;overflow:hidden}
.mcard::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon3),transparent)}
.mcard-icon{font-size:18px;margin-bottom:4px}
.mcard-val{font-size:18px;font-weight:700;font-family:'Orbitron',monospace;line-height:1}
.mcard-label{font-size:9px;color:var(--hint);margin-top:3px;letter-spacing:1px}
.mcard-sub{font-size:9px;margin-top:2px;font-weight:600}

/* PERIOD */
.period-row{
  display:flex;gap:3px;margin-bottom:10px;
  background:rgba(0,0,0,0.5);
  border-radius:3px;padding:3px;
  border:1px solid var(--border);
}
.ptab{
  flex:1;padding:6px;border:none;border-radius:2px;
  background:transparent;color:var(--hint);
  font-size:11px;font-weight:600;cursor:pointer;
  font-family:'Share Tech Mono',monospace;
  transition:all .2s;
}
.ptab.on{
  background:rgba(0,255,159,0.15);
  color:var(--neon1);
  box-shadow:var(--glow1);
}

/* BARS */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:11px;min-width:100px;color:var(--hint)}
.bar-bg{flex:1;background:rgba(0,255,159,0.1);border-radius:0;height:6px;border:1px solid var(--border)}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--neon1),var(--neon3));
  box-shadow:0 0 8px rgba(0,255,159,0.6);transition:width .5s ease}
.bar-val{font-size:11px;min-width:30px;text-align:right;color:var(--neon1)}

/* LIST */
.litem{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  border-bottom:1px solid rgba(0,255,159,0.08);
  background:transparent;
  transition:background .2s;
}
.litem:hover{background:rgba(0,255,159,0.03)}
.litem:last-child{border-bottom:none}
.litem-icon{
  width:36px;height:36px;border-radius:3px;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;flex-shrink:0;
  border:1px solid var(--border);
  background:rgba(0,0,0,0.5);
}
.litem-info{flex:1;min-width:0}
.litem-name{font-size:13px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.litem-sub{font-size:11px;color:var(--hint);margin-top:2px}
.litem-right{text-align:right;flex-shrink:0}
.litem-val{font-size:13px;font-weight:700;color:var(--neon1)}
.litem-sub2{font-size:10px;color:var(--hint)}

/* BADGES */
.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:10px;font-weight:600;letter-spacing:1px}
.badge.ok{background:rgba(0,255,159,0.1);color:var(--neon1);border:1px solid rgba(0,255,159,0.3)}
.badge.warn{background:rgba(255,204,0,0.1);color:var(--amber);border:1px solid rgba(255,204,0,0.3)}
.badge.err{background:rgba(255,51,102,0.1);color:var(--red);border:1px solid rgba(255,51,102,0.3)}
.badge.info{background:rgba(0,212,255,0.1);color:var(--neon3);border:1px solid rgba(0,212,255,0.3)}
.badge.purple{background:rgba(255,0,255,0.1);color:var(--neon2);border:1px solid rgba(255,0,255,0.3)}

/* BTNS */
.btn{
  display:block;width:100%;padding:11px;border:1px solid var(--neon1);
  border-radius:3px;background:rgba(0,255,159,0.08);
  color:var(--neon1);font-size:13px;font-weight:600;
  cursor:pointer;margin-bottom:8px;
  font-family:'Share Tech Mono',monospace;
  letter-spacing:1px;transition:all .2s;
  box-shadow:var(--glow1);
}
.btn:active{background:rgba(0,255,159,0.2)}
.btn.red{border-color:var(--red);background:rgba(255,51,102,0.08);color:var(--red);box-shadow:0 0 8px rgba(255,51,102,0.3)}
.btn.amber{border-color:var(--amber);background:rgba(255,204,0,0.08);color:var(--amber);box-shadow:0 0 8px rgba(255,204,0,0.3)}
.btn.outline{background:transparent;box-shadow:none}
.btn.sm{padding:6px 12px;width:auto;display:inline-block;margin:0;font-size:11px}
.btn-row{display:flex;gap:6px;margin-top:8px}

/* FORM */
.finp{
  width:100%;padding:10px 12px;
  border:1px solid var(--border);border-radius:2px;
  font-size:13px;background:rgba(0,0,0,0.5);
  color:var(--text);outline:none;margin-bottom:10px;
  font-family:'Share Tech Mono',monospace;
}
.finp:focus{border-color:var(--neon1);box-shadow:var(--glow1)}
.flabel{font-size:10px;color:var(--hint);font-weight:600;margin-bottom:4px;letter-spacing:2px}
.fcheck-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.fcheck{display:flex;align-items:center;gap:5px;padding:5px 10px;
  border:1px solid var(--border);border-radius:2px;cursor:pointer;
  font-size:11px;color:var(--hint)}
.fcheck input{accent-color:var(--neon1)}
.fcheck.on{border-color:var(--neon1);color:var(--neon1);background:rgba(0,255,159,0.05)}

/* SECTION */
.ann-section{
  background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:14px;margin-bottom:10px;
  position:relative;overflow:hidden;
}
.ann-section::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon2),transparent);
}
.ann-title{font-size:12px;font-weight:600;margin-bottom:12px;
  color:var(--neon2);letter-spacing:2px;text-shadow:var(--glow2)}

/* SUB CARD */
.sub-card{background:var(--card);border:1px solid var(--border);
  border-radius:4px;padding:12px;margin-bottom:8px}
.sub-row{display:flex;align-items:center;gap:10px}
.sub-info{flex:1}
.sub-name{font-size:13px;font-weight:600;color:var(--text)}
.sub-dates{font-size:11px;color:var(--hint);margin-top:2px}
.progress-wrap{margin-top:8px}
.progress{height:4px;background:rgba(0,255,159,0.1);border-radius:0;overflow:hidden;
  border:1px solid var(--border)}
.progress-bar{height:4px;background:linear-gradient(90deg,var(--neon1),var(--neon3));
  box-shadow:0 0 8px rgba(0,255,159,0.6);transition:width .3s}
.progress-bar.warn{background:linear-gradient(90deg,var(--amber),#ff8800)}
.progress-bar.err{background:linear-gradient(90deg,var(--red),#ff0055)}

/* COMPLAINT */
.complaint-card{background:var(--card);border:1px solid rgba(255,51,102,0.2);
  border-radius:4px;padding:12px;margin-bottom:8px}
.cc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.cc-msg{font-size:13px;line-height:1.5;margin-bottom:10px;
  padding:10px;background:rgba(255,51,102,0.05);border-radius:3px;
  border-left:2px solid var(--red);color:var(--text)}
.cc-acts{display:flex;gap:6px;flex-wrap:wrap}

/* TABLE */
.reg-table{width:100%;border-collapse:collapse;font-size:11px}
.reg-table th{
  text-align:left;padding:6px 8px;color:var(--hint);
  font-size:10px;letter-spacing:1px;
  border-bottom:1px solid var(--border);
}
.reg-table td{padding:7px 8px;border-bottom:1px solid rgba(0,255,159,0.05)}
.reg-table tr:hover td{background:rgba(0,255,159,0.02)}
.reg-bar-wrap{width:50px;background:rgba(0,255,159,0.1);border-radius:0;height:3px;
  display:inline-block;border:1px solid var(--border)}
.reg-bar-inner{height:3px;background:linear-gradient(90deg,var(--neon1),var(--neon3));
  box-shadow:0 0 5px rgba(0,255,159,0.5)}
.new28{color:var(--neon1);font-weight:600}

/* LOADING — cyberpunk */
.loading{
  text-align:center;padding:40px 20px;color:var(--hint);
  font-family:'Share Tech Mono',monospace;
}
.cp-loader{
  display:inline-block;width:40px;height:40px;
  border:2px solid rgba(0,255,159,0.1);
  border-top:2px solid var(--neon1);
  border-right:2px solid var(--neon3);
  border-radius:50%;
  animation:cpSpin .8s linear infinite;
  box-shadow:var(--glow1),inset var(--glow3);
  margin-bottom:10px;
}
@keyframes cpSpin{to{transform:rotate(360deg)}}
.cp-text{
  font-size:11px;letter-spacing:3px;color:var(--neon1);
  animation:blink 1s step-end infinite;
}
@keyframes blink{50%{opacity:0}}

.err-msg{color:var(--red);text-align:center;padding:20px;font-size:12px;
  border:1px solid rgba(255,51,102,0.2);border-radius:3px;
  background:rgba(255,51,102,0.05)}

/* SEC TITLE */
.sec-title{
  font-size:10px;font-weight:700;color:var(--neon3);
  letter-spacing:3px;margin:12px 0 8px;
  text-shadow:var(--glow3);
}
.sec-title::before{content:'// '}

/* SETT ROW */
.sett-row{padding:10px 0;border-bottom:1px solid rgba(0,255,159,0.08)}

/* ANIMATIONS */
@keyframes pulse{
  0%,100%{opacity:1;box-shadow:0 0 5px rgba(0,212,255,0.3)}
  50%{opacity:.7;box-shadow:0 0 15px rgba(0,212,255,0.7)}
}
@keyframes glitch{
  0%,100%{text-shadow:var(--glow1)}
  25%{text-shadow:2px 0 var(--neon2),var(--glow1)}
  75%{text-shadow:-2px 0 var(--neon3),var(--glow1)}
}
.glitch{animation:glitch 3s infinite}

/* LIST container */
.list-wrap{
  background:rgba(0,0,0,0.3);
  border:1px solid var(--border);
  border-radius:4px;overflow:hidden;
  margin-bottom:10px;
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-top">
    <div class="hdr-title glitch">⬡ XAZDENT ADMIN</div>
    <div class="hdr-badge" id="online-badge">● ONLINE</div>
  </div>
  <!-- COUNTDOWN -->
  <div class="countdown">
    <div style="font-size:10px;color:var(--hint);letter-spacing:1px;margin-right:4px">OY OXIRIGACHA:</div>
    <div class="cd-unit"><div class="cd-label">KUN</div><div class="cd-val" id="cd-d">--</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-label">SOAT</div><div class="cd-val" id="cd-h">--</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-label">DAQ</div><div class="cd-val" id="cd-m">--</div></div>
    <div class="cd-sep">:</div>
    <div class="cd-unit"><div class="cd-label">SEK</div><div class="cd-val" id="cd-s">--</div></div>
  </div>
</div>

<div class="nav" id="nav-bar"></div>

<!-- STATS -->
<div class="pg on" id="pg-stats">
  <div class="period-row">
    <button class="ptab on" onclick="setPeriod('day',this)">BUGUN</button>
    <button class="ptab" onclick="setPeriod('week',this)">HAFTA</button>
    <button class="ptab" onclick="setPeriod('month',this)">OY</button>
    <button class="ptab" onclick="setPeriod('all',this)">JAMI</button>
  </div>
  <div id="stats-body"><div class="loading"><div class="cp-loader"></div><div class="cp-text">YUKLANMOQDA...</div></div></div>
</div>

<!-- USERS -->
<div class="pg" id="pg-users">
  <div id="users-stats-top"><div class="loading"><div class="cp-loader"></div><div class="cp-text">SKANERLAYAPMAN...</div></div></div>
  <div class="period-row" style="margin-top:10px">
    <button class="ptab on" onclick="setUF('all',this)">BARCHASI</button>
    <button class="ptab" onclick="setUF('clinic',this)">🏥 KLINIKA</button>
    <button class="ptab" onclick="setUF('seller',this)">🛒 SOTUVCHI</button>
    <button class="ptab" onclick="setUF('zubtex',this)">🔬 ZUBTEX</button>
  </div>
  <input class="finp" id="user-search" placeholder="⟩ QIDIRISH: ism / telefon / ID..."
    oninput="onUS(this.value)" style="margin-bottom:8px">
  <div id="users-body"><div class="loading"><div class="cp-loader"></div></div></div>
</div>

<!-- BUYURTMALAR -->
<div class="pg" id="pg-orders">
  <div class="period-row">
    <button class="ptab on" onclick="setOF('catalog',this)">🛍 KATALOG</button>
    <button class="ptab" onclick="setOF('all',this)">📋 EHTIYOJ</button>
    <button class="ptab" onclick="setOF('active',this)">AKTIV</button>
    <button class="ptab" onclick="setOF('done',this)">TUGAGAN</button>
  </div>
  <div id="orders-body"><div class="loading"><div class="cp-loader"></div></div></div>
</div>

<!-- MARKET -->
<div class="pg" id="pg-market">
  <div id="market-body"><div class="loading"><div class="cp-loader"></div></div></div>
</div>

<!-- E'LONLAR -->
<div class="pg" id="pg-announce">
  <div class="ann-section">
    <div class="ann-title">▶ YANGI E'LON YUBORISH</div>
    <div class="flabel">KIMGA:</div>
    <div class="fcheck-row" id="ann-aud">
      <label class="fcheck"><input type="checkbox" value="clinic"> 🏥 KLINIKALAR</label>
      <label class="fcheck"><input type="checkbox" value="zubtex"> 🔬 ZUBTEXNIKLAR</label>
      <label class="fcheck"><input type="checkbox" value="seller"> 🛒 SOTUVCHILAR</label>
    </div>
    <div class="flabel">HUDUD:</div>
    <div class="fcheck-row" id="ann-reg">
      <label class="fcheck"><input type="checkbox" value="Toshkent shahri"> TOSHKENT SH.</label>
      <label class="fcheck"><input type="checkbox" value="Toshkent viloyati"> TOSHKENT VIL.</label>
      <label class="fcheck"><input type="checkbox" value="Samarqand"> SAMARQAND</label>
      <label class="fcheck"><input type="checkbox" value="Buxoro"> BUXORO</label>
      <label class="fcheck"><input type="checkbox" value="Farg'ona"> FARG'ONA</label>
      <label class="fcheck"><input type="checkbox" value="Andijon"> ANDIJON</label>
      <label class="fcheck"><input type="checkbox" value="Namangan"> NAMANGAN</label>
      <label class="fcheck"><input type="checkbox" value="Xorazm"> XORAZM</label>
      <label class="fcheck"><input type="checkbox" value="Qashqadaryo"> QASHQADARYO</label>
      <label class="fcheck"><input type="checkbox" value="Surxondaryo"> SURXONDARYO</label>
      <label class="fcheck"><input type="checkbox" value="Jizzax"> JIZZAX</label>
      <label class="fcheck"><input type="checkbox" value="Sirdaryo"> SIRDARYO</label>
      <label class="fcheck"><input type="checkbox" value="Navoiy"> NAVOIY</label>
      <label class="fcheck"><input type="checkbox" value="Qoraqalpog'iston"> QQ</label>
    </div>
    <div style="margin-bottom:10px">
      <button class="btn sm outline" onclick="chkRegs(true)" style="margin-right:6px">✓ BARCHASI</button>
      <button class="btn sm outline" onclick="chkRegs(false)">✕ TOZALA</button>
    </div>
    <div class="flabel">BITTA USER (TELEGRAM ID):</div>
    <input class="finp" id="ann-uid" type="number" placeholder="243785989">
    <div class="flabel">MATN *</div>
    <textarea class="finp" id="ann-text" rows="4" placeholder="// E'lon matni..."></textarea>
    <div id="ann-preview" style="display:none;margin-bottom:10px;padding:12px;
      background:rgba(255,0,255,0.05);border:1px solid rgba(255,0,255,0.2);
      border-radius:3px;font-size:13px;line-height:1.5;color:var(--neon2)"></div>
    <div class="btn-row">
      <button class="btn sm outline" onclick="annPrev()">◎ KO'RISH</button>
      <button class="btn sm" onclick="annSend()">▶ YUBORISH</button>
    </div>
    <div id="ann-res" style="margin-top:8px;font-size:11px;letter-spacing:1px"></div>
  </div>

// ── COUNTDOWN ─────────────────────────────────────────────────────────────────
function updateCountdown() {
  var now = new Date();
  var end = new Date(now.getFullYear(), now.getMonth()+1, 1, 0, 0, 0);
  var diff = Math.max(0, end - now);
  var d = Math.floor(diff/86400000);
  var h = Math.floor((diff%86400000)/3600000);
  var m = Math.floor((diff%3600000)/60000);
  var s = Math.floor((diff%60000)/1000);
  var z = function(n){return n<10?'0'+n:n;};
  document.getElementById('cd-d').textContent = z(d);
  document.getElementById('cd-h').textContent = z(h);
  document.getElementById('cd-m').textContent = z(m);
  document.getElementById('cd-s').textContent = z(s);
}
updateCountdown();
setInterval(updateCountdown, 1000);

// ── NAV ───────────────────────────────────────────────────────────────────────
var DEFAULT_TABS = [
  {id:'users',     label:'👥 USERS'},
  {id:'stats',     label:'📊 STATS'},
  {id:'orders',    label:'📋 BUYURTMA'},
  {id:'market',    label:'🛍 MARKET'},
  {id:'announce',  label:"📢 E'LON"},
  {id:'subs',      label:'💳 OBUNA'},
  {id:'complaints',label:'🚨 SHIKOYAT'},
  {id:'checks',    label:'✅ CHEK'},
  {id:'settings',  label:'⚙️ SOZLAMA'},
];
function getSaved(){
  try{var s=localStorage.getItem('admin_tabs_cp');
    if(s){var ids=JSON.parse(s),map={};DEFAULT_TABS.forEach(t=>map[t.id]=t);
      return ids.map(id=>map[id]).filter(Boolean);}
  }catch(e){}return DEFAULT_TABS;
}
var curTabs=getSaved(), curTabId=curTabs[0].id;
function buildNav(){
  var nav=document.getElementById('nav-bar');nav.innerHTML='';
  curTabs.forEach(function(tab){
    var btn=document.createElement('button');
    btn.className='nb'+(tab.id===curTabId?' on':'');
    btn.textContent=tab.label;
    btn.setAttribute('data-id',tab.id);
    btn.setAttribute('draggable','true');
    btn.onclick=function(){goTab(tab.id,btn);};
    btn.addEventListener('dragstart',function(e){e.dataTransfer.setData('text/plain',tab.id);btn.style.opacity='.3';});
    btn.addEventListener('dragend',function(){btn.style.opacity='1';});
    btn.addEventListener('dragover',function(e){e.preventDefault();btn.classList.add('drag-over');});
    btn.addEventListener('dragleave',function(){btn.classList.remove('drag-over');});
    btn.addEventListener('drop',function(e){
      e.preventDefault();btn.classList.remove('drag-over');
      var fi=curTabs.findIndex(t=>t.id===e.dataTransfer.getData('text/plain'));
      var ti=curTabs.findIndex(t=>t.id===tab.id);
      if(fi===ti)return;
      curTabs.splice(ti,0,curTabs.splice(fi,1)[0]);
      try{localStorage.setItem('admin_tabs_cp',JSON.stringify(curTabs.map(t=>t.id)));}catch(e){}
      buildNav();
    });
    nav.appendChild(btn);
  });
}
function goTab(name,btn){
  curTabId=name;

  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+name).classList.add('on');
  (btn||document.querySelector('[data-id="'+name+'"]'))?.classList.add('on');
  if(!loaded[name]){loaded[name]=true;fetchPage(name);}
}

    body:JSON.stringify(data)}).then(function(r){return r.json();});
}

        '<div class="litem-info"><div class="litem-name">'+esc(p.name)+'</div>'+
        '<div class="litem-sub">'+esc(p.shop_name||'')+'</div></div>'+
        '<div class="litem-right"><div class="litem-val">'+p.views+'</div><div class="litem-sub2">KO\'RISH</div></div></div>';
    }).join('');
    var toHtml=(m.top_ordered||[]).map(function(p,i){
      return '<div class="litem"><div class="litem-icon" style="color:var(--neon1);font-weight:700">'+(i+1)+'</div>'+
        '<div class="litem-info"><div class="litem-name">'+esc(p.name)+'</div>'+
        '<div class="litem-sub">'+esc(p.shop_name||'')+'</div></div>'+
        '<div class="litem-right"><div class="litem-val">'+p.orders+'</div><div class="litem-sub2">BUYURTMA</div></div></div>';
    }).join('');
    var tsHtml=(m.top_searches||[]).map(function(s){
      return '<div class="litem"><div class="litem-icon">🔍</div>'+
        '<div class="litem-info"><div class="litem-name">'+esc(s.query)+'</div></div>'+
        '<div class="litem-right"><div class="litem-val">'+s.cnt+'</div></div></div>';
    }).join('');
    var warn='';
    if(m.no_photo_count) warn+='<div style="color:var(--amber);font-size:12px;margin-bottom:4px">⚠ RASMSIZ: '+m.no_photo_count+' TA</div>';
    if(m.no_stock_count) warn+='<div style="color:var(--red);font-size:12px">⊘ STOKSIZ: '+m.no_stock_count+' TA</div>';
    document.getElementById('market-body').innerHTML=
      '<div class="grid2" style="margin-bottom:10px">'+
        sc('JAMI MAHSULOT',m.total_products,"DO'KON: "+m.total_shops,'blue')+
        sc('BU OY KO\'RISH',m.views_month,'JAMI: '+m.views_total,'purple')+
        sc('BU OY BUYURTMA',m.orders_month,'JAMI: '+m.orders_total,'green')+
        sc('O\'RT. NARX',fmt(m.avg_price)+" SO'M",'','')+'</div>'+
      (warn?'<div class="card" style="margin-bottom:10px">'+warn+'</div>':'')+
      '<div class="sec-title">NEON TOP — KO\'P KO\'RILGAN</div>'+
      '<div class="list-wrap">'+(tvHtml||'<div class="loading">// MA\'LUMOT YO\'Q</div>')+'</div>'+
      '<div class="sec-title">NEON TOP — KO\'P BUYURTMA</div>'+
      '<div class="list-wrap">'+(toHtml||'<div class="loading">// MA\'LUMOT YO\'Q</div>')+'</div>'+
      '<div class="sec-title">QIDIRUV LOGI</div>'+
      '<div class="list-wrap">'+(tsHtml||'<div class="loading">// LOG YO\'Q</div>')+'</div>';
  }).catch(function(e){showErr('market-body',e.message);});
}

// ── E'LONLAR ──────────────────────────────────────────────────────────────────
function annPrev(){
  var txt=document.getElementById('ann-text').value.trim();if(!txt)return;
  var p=document.getElementById('ann-preview');
  p.style.display='block';
  p.innerHTML='// E\'LON PREVIEW:<br><br>'+esc(txt).replace(/\n/g,'<br>');
}
function annSend(){
  var txt=document.getElementById('ann-text').value.trim();
  if(!txt){alert('MATNNI KIRITING!');return;}
  var auds=Array.from(document.querySelectorAll('#ann-aud input:checked')).map(i=>i.value);
  var regs=Array.from(document.querySelectorAll('#ann-reg input:checked')).map(i=>i.value);
  var suid=parseInt(document.getElementById('ann-uid').value)||0;
  if(!auds.length&&!suid){alert('KIMGA YUBORISHNI TANLANG!');return;}
  var res=document.getElementById('ann-res');
  res.textContent='// YUBORILMOQDA...';res.style.color='var(--hint)';
  apiPost('/api/admin/announce',{text:txt,audiences:auds,regions:regs,single_uid:suid}).then(function(d){
    if(d.ok){res.textContent='✓ '+d.sent+' TA FOYDALANUVCHIGA YUBORILDI';res.style.color='var(--neon1)';
      document.getElementById('ann-text').value='';
      document.getElementById('ann-preview').style.display='none';
      loadAnnHistory();
    }else{res.textContent='⚠ '+(d.error||'XATO');res.style.color='var(--red)';}
  });
}
function chkRegs(c){document.querySelectorAll('#ann-reg input').forEach(function(i){i.checked=c;i.closest('.fcheck').classList.toggle('on',c);});}
function loadAnnHistory(){
  api('/api/admin/announce_history').then(function(d){
    if(!d.ok||!d.data||!d.data.length){
      document.getElementById('ann-history').innerHTML='<div style="color:var(--hint);font-size:11px">// TARIX YO\'Q</div>';return;
    }
    document.getElementById('ann-history').innerHTML=d.data.map(function(a){
      return '<div style="padding:8px 0;border-bottom:1px solid rgba(0,255,159,0.08)">'+
        '<div style="font-size:12px;color:var(--text)">'+esc(a.text.slice(0,60))+(a.text.length>60?'...':'')+'</div>'+
        '<div style="font-size:10px;color:var(--hint);margin-top:2px;letter-spacing:1px">'+fmtDate(a.created_at)+' · '+a.sent_count+' TA</div>'+
      '</div>';
    }).join('');
  });
}

// ── OBUNA ─────────────────────────────────────────────────────────────────────
function loadSubs(){
  api('/api/admin/subscriptions').then(function(d){
    if(!d.ok){showErr('subs-body',d.error||'xato');return;}
    var subs=d.data||[],st=d.stats||{};
    document.getElementById('sub-total').textContent=st.total||0;
    document.getElementById('sub-active').textContent=st.active||0;
    document.getElementById('sub-trial').textContent=st.trial||0;
    document.getElementById('sub-expired').textContent=st.expired||0;
    if(!subs.length){document.getElementById('subs-body').innerHTML='<div class="loading">// OBUNACHI YO\'Q</div>';return;}
    document.getElementById('subs-body').innerHTML=subs.map(function(s){
      var dl=s.days_left||0,pct=Math.min(100,Math.max(0,dl/30*100));
      var bc=dl>7?'':dl>3?'warn':'err';
      var badge=s.status==='active'?'<span class="badge ok">FAOL</span>':
        s.status==='trial'?'<span class="badge info">TRIAL</span>':'<span class="badge err">TUGAGAN</span>';
      return '<div class="sub-card">'+
        '<div class="sub-row"><div style="font-size:20px">🏪</div>'+
          '<div class="sub-info"><div class="sub-name">'+esc(s.shop_name||s.name||'?')+'</div>'+
          '<div class="sub-dates">'+esc(s.region||'')+(s.paid_until?' · '+fmtDate(s.paid_until)+' GACHA':'')+'</div></div>'+
          badge+'</div>'+
        '<div class="progress-wrap"><div style="font-size:10px;color:var(--hint);margin-bottom:3px;letter-spacing:1px">'+dl+' KUN QOLDI</div>'+
        '<div class="progress"><div class="progress-bar '+bc+'" style="width:'+pct+'%"></div></div></div>'+
        '<div class="btn-row" style="margin-top:8px">'+
          '<button class="btn sm" onclick="extSub('+s.user_id+')">+30 KUN</button>'+
          '<button class="btn sm outline" onclick="msgUser('+s.user_id+')">✉</button>'+
          (s.status==='expired'?'<button class="btn sm red" onclick="blkShop('+s.user_id+')">⊘ MUZLAT</button>':'')+
        '</div></div>';
    }).join('');
  }).catch(function(e){showErr('subs-body',e.message);});
}
function extSub(uid){apiPost('/api/admin/extend_sub',{target_uid:uid}).then(function(d){if(d.ok){loaded.subs=false;loadSubs();alert('✓ 30 KUN QO\'SHILDI');}});}
function blkShop(uid){if(!confirm('MUZLATISH?'))return;apiPost('/api/admin/toggle_block',{target_uid:uid,block:1}).then(function(d){if(d.ok){loaded.subs=false;loadSubs();}});}

// ── SHIKOYATLAR ───────────────────────────────────────────────────────────────
function setCF(f,btn){curCF=f;document.querySelectorAll('#pg-complaints .ptab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');loaded.complaints=true;loadComplaints();}
function loadComplaints(){
  document.getElementById('complaints-body').innerHTML=cp_load();
  api('/api/admin/complaints?status='+curCF).then(function(d){
    if(!d.ok){showErr('complaints-body',d.error||'xato');return;}
    var items=d.data||[];
    if(!items.length){document.getElementById('complaints-body').innerHTML='<div class="loading">// SHIKOYAT YO\'Q</div>';return;}
    document.getElementById('complaints-body').innerHTML=items.map(function(c){
      return '<div class="complaint-card">'+
        '<div class="cc-header"><div>'+
          '<div style="font-size:13px;font-weight:600;color:var(--text)">'+esc(c.from_name||'?')+' → '+esc(c.against_name||'?')+'</div>'+
          '<div style="font-size:10px;color:var(--hint);letter-spacing:1px">'+fmtDate(c.created_at)+'</div>'+
        '</div><span class="badge '+(c.status==='new'?'err':c.status==='closed'?'ok':'warn')+'">'+c.status.toUpperCase()+'</span></div>'+
        '<div class="cc-msg">'+esc(c.reason)+'</div>'+
        '<div class="cc-acts">'+
          '<button class="btn sm outline" onclick="warnU('+c.against_user_id+')">⚠ OGOHLANTIR</button>'+
          '<button class="btn sm red" onclick="toggleBlock('+c.against_user_id+',1)">⊘ BLOK</button>'+
          '<button class="btn sm" onclick="closeC('+c.id+')">✓ YOPISH</button>'+
        '</div></div>';
    }).join('');
  }).catch(function(e){showErr('complaints-body',e.message);});
}
function closeC(cid){apiPost('/api/admin/close_complaint',{complaint_id:cid}).then(function(d){if(d.ok){loaded.complaints=false;loadComplaints();}});}
function warnU(uid){apiPost('/api/admin/msg_user',{target_uid:uid,text:"⚠ Profilingizga shikoyat tushdi. Qoidalarga rioya qiling."}).then(function(d){alert(d.ok?'✓ YUBORILDI':'⚠ XATO');});}

// ── CHEKLAR ───────────────────────────────────────────────────────────────────
function loadChecks(){
  document.getElementById('checks-body').innerHTML=cp_load();
  api('/api/admin/checks').then(function(d){
    if(!d.ok){showErr('checks-body',d.error||'xato');return;}
    var items=d.data||[];
    if(!items.length){document.getElementById('checks-body').innerHTML='<div class="loading">// KUTAYOTGAN CHEKLAR YO\'Q</div>';return;}
    document.getElementById('checks-body').innerHTML=items.map(function(tx){
      return '<div class="sub-card" id="chk-'+tx.id+'">'+
        '<div class="sub-row"><div style="font-size:20px">💳</div>'+
          '<div class="sub-info"><div class="sub-name">'+esc(tx.name||'?')+'</div>'+
          '<div class="sub-dates">'+fmtDate(tx.created_at)+'</div></div>'+
          '<div style="color:var(--neon1);font-weight:700;font-family:Orbitron,monospace">'+fmt(tx.amount)+" SO'M"+
            '<div style="font-size:10px;color:var(--neon3)">→ '+tx.balls+' BALL</div></div>'+
        '</div>'+
        '<div class="btn-row" style="margin-top:8px">'+
          '<button class="btn sm" onclick="appr('+tx.id+','+tx.user_id+','+tx.balls+')">✓ TASDIQLASH</button>'+
          '<button class="btn sm red" onclick="rej('+tx.id+','+tx.user_id+')">✕ RAD</button>'+
        '</div></div>';
    }).join('');
  }).catch(function(e){showErr('checks-body',e.message);});
}
function appr(ti,ui,b){apiPost('/api/admin/check_action',{action:'approve',tx_id:ti,user_id:ui,balls:b}).then(function(d){if(d.ok){var el=document.getElementById('chk-'+ti);if(el)el.innerHTML='<div style="padding:10px;color:var(--neon1);letter-spacing:2px">✓ TASDIQLANDI</div>';}});}
function rej(ti,ui){apiPost('/api/admin/check_action',{action:'reject',tx_id:ti,user_id:ui}).then(function(d){if(d.ok){var el=document.getElementById('chk-'+ti);if(el)el.innerHTML='<div style="padding:10px;color:var(--red);letter-spacing:2px">✕ RAD ETILDI</div>';}});}

// ── SETTINGS ──────────────────────────────────────────────────────────────────
function loadSettings(){
  api('/api/admin/settings').then(function(d){
    if(!d.ok){showErr('settings-body',d.error||'xato');return;}
    var s=d.data||{};
    document.getElementById('settings-body').innerHTML=
      srow("💰 1 BALL NARXI (SO'M)",'si-ball',s.ball_price||'1000','number')+
      srow('💳 KARTA RAQAMI','si-card',s.card_number||'')+
      srow("📢 E'LON NARXI (BALL)",'si-elon',s.elon_price||'0','number')+
      srow('🆓 TRIAL DAVRI (KUN)','si-trial',s.trial_days||'30','number')+
      srow("💎 OBUNA NARXI (SO'M)",'si-sub',s.sub_price||'300000','number')+
      '<button class="btn" style="margin-top:4px" onclick="saveSett()">⬆ SAQLASH</button>';
  });
}
function srow(l,id,v,t){
  return '<div class="sett-row"><div class="flabel">'+esc(l)+'</div>'+
    '<input class="finp" id="'+id+'" value="'+esc(v)+'" type="'+(t||'text')+'" style="margin-bottom:0"></div>';
}
function saveSett(){
  apiPost('/api/admin/save_settings',{
    ball_price:document.getElementById('si-ball').value,
    card_number:document.getElementById('si-card').value,
    elon_price:document.getElementById('si-elon').value,
    trial_days:document.getElementById('si-trial').value,
    sub_price:document.getElementById('si-sub').value,
  }).then(function(d){alert(d.ok?'✓ SAQLANDI':'⚠ XATO');});
}

function dlExcel(){window.location.href='/api/admin/excel?uid='+UID;}

fetchPage(curTabId);
