<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Katalog</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  --bg:var(--tg-theme-bg-color,#f2f2f7);
  --card:var(--tg-theme-secondary-bg-color,#fff);
  --text:var(--tg-theme-text-color,#000);
  --hint:var(--tg-theme-hint-color,#888);
  --btn:var(--tg-theme-button-color,#007aff);
  --btnT:var(--tg-theme-button-text-color,#fff);
  --border:rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:var(--bg);color:var(--text);padding-bottom:80px}

/* Header */
.hdr{background:var(--card);padding:12px 16px;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:20}
.hdr-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.hdr h1{font-size:17px;font-weight:600;flex:1}
.mode-btn{padding:6px 14px;border:none;border-radius:10px;
  font-size:12px;font-weight:600;cursor:pointer;
  background:var(--btn);color:var(--btnT);
  -webkit-tap-highlight-color:transparent}

/* Search */
.search-wrap{position:relative}
.search{width:100%;padding:9px 36px 9px 14px;
  border:1px solid var(--border);border-radius:10px;
  background:var(--bg);color:var(--text);
  font-size:14px;outline:none}
.search:focus{border-color:var(--btn)}
.search-ic{position:absolute;right:12px;top:50%;transform:translateY(-50%);
  color:var(--hint);font-size:14px;pointer-events:none}

/* Category chips */
.cats{display:flex;gap:6px;padding:10px 16px;
  overflow-x:auto;background:var(--card);
  border-bottom:1px solid var(--border);scrollbar-width:none}
.cats::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;padding:6px 14px;border-radius:20px;
  border:1.5px solid var(--border);font-size:12px;font-weight:500;
  cursor:pointer;background:transparent;color:var(--text);
  -webkit-tap-highlight-color:transparent;white-space:nowrap}
.cat-btn.on{background:var(--btn);color:var(--btnT);border-color:transparent}

/* Products grid */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px}

/* Product card */
.pcard{background:var(--card);border-radius:14px;
  overflow:hidden;border:1px solid var(--border);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:transform .1s}
.pcard:active{transform:scale(.97)}
.pimg{width:100%;height:120px;object-fit:cover;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  font-size:36px}
.pimg img{width:100%;height:100%;object-fit:cover}
.pbody{padding:10px}
.pname{font-size:13px;font-weight:600;margin-bottom:4px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.pshop{font-size:11px;color:var(--hint);margin-bottom:6px}
.pprice{font-size:15px;font-weight:700;color:var(--btn)}
.punit{font-size:11px;color:var(--hint);font-weight:400}
.porder{margin-top:8px;width:100%;padding:8px;border:none;
  border-radius:8px;background:var(--btn);color:var(--btnT);
  font-size:12px;font-weight:600;cursor:pointer}

/* My products (seller mode) */
.myprod-card{background:var(--card);border-radius:12px;
  padding:14px;margin:0 12px 10px;
  border:1px solid var(--border);display:flex;align-items:center;gap:12px}
.myprod-img{width:50px;height:50px;border-radius:8px;
  object-fit:cover;background:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.myprod-img img{width:50px;height:50px;border-radius:8px;object-fit:cover}
.myprod-info{flex:1;min-width:0}
.myprod-name{font-size:14px;font-weight:600;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.myprod-price{font-size:13px;color:var(--btn);font-weight:600;margin-top:2px}
.myprod-cat{font-size:11px;color:var(--hint);margin-top:2px}
.myprod-del{width:32px;height:32px;border:none;border-radius:8px;
  background:rgba(220,38,38,.1);color:#dc2626;
  font-size:16px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center}

/* Add button */
.add-fab{position:fixed;bottom:80px;right:16px;
  width:52px;height:52px;border-radius:50%;border:none;
  background:var(--btn);color:var(--btnT);
  font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(0,122,255,.4);
  display:flex;align-items:center;justify-content:center;z-index:30}

/* Detail overlay */
.overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:40;align-items:flex-end}
.overlay.on{display:flex}
.detail{background:var(--card);border-radius:20px 20px 0 0;
  padding:20px;width:100%;max-height:80vh;overflow-y:auto}
.det-img{width:100%;height:200px;border-radius:12px;
  object-fit:cover;background:var(--bg);margin-bottom:14px;
  display:flex;align-items:center;justify-content:center;font-size:60px}
.det-img img{width:100%;height:200px;border-radius:12px;object-fit:cover}
.det-name{font-size:18px;font-weight:700;margin-bottom:4px}
.det-shop{font-size:13px;color:var(--hint);margin-bottom:10px}
.det-price{font-size:24px;font-weight:700;color:var(--btn);margin-bottom:8px}
.det-desc{font-size:14px;color:var(--hint);line-height:1.6;margin-bottom:16px}
.det-buy{width:100%;padding:14px;border:none;border-radius:12px;
  background:var(--btn);color:var(--btnT);font-size:16px;font-weight:600;cursor:pointer}
.det-close{position:absolute;top:16px;right:16px;
  width:30px;height:30px;border:none;border-radius:50%;
  background:rgba(0,0,0,.1);color:var(--text);font-size:16px;cursor:pointer}

/* Add product form */
.form-overlay{display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);z-index:50;align-items:flex-end}
.form-overlay.on{display:flex}
.form-sheet{background:var(--card);border-radius:20px 20px 0 0;
  padding:20px;width:100%;max-height:90vh;overflow-y:auto}
.form-title{font-size:17px;font-weight:600;margin-bottom:16px}
.finp-label{font-size:12px;color:var(--hint);margin-bottom:4px;font-weight:500}
.finp{width:100%;padding:11px 14px;border:1.5px solid var(--border);
  border-radius:10px;font-size:15px;background:var(--bg);
  color:var(--text);outline:none;margin-bottom:12px}
.finp:focus{border-color:var(--btn)}
.finp-row{display:flex;gap:8px}
.finp-row .finp{margin-bottom:0}
.img-area{width:100%;height:120px;border:2px dashed var(--border);
  border-radius:12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  cursor:pointer;margin-bottom:12px;gap:6px}
.img-area.has{border-color:var(--btn);border-style:solid}
.img-area img{width:100%;height:118px;border-radius:10px;object-fit:cover}
.img-area-label{font-size:13px;color:var(--btn);font-weight:500}
.img-area-hint{font-size:11px;color:var(--hint)}
.fsave{width:100%;padding:14px;border:none;border-radius:12px;
  background:var(--btn);color:var(--btnT);font-size:16px;
  font-weight:600;cursor:pointer;margin-top:4px}
.fsave:disabled{opacity:.4}
.fcancel{width:100%;padding:12px;border:none;border-radius:12px;
  background:transparent;color:var(--hint);font-size:14px;
  cursor:pointer;margin-top:6px}

.loading{text-align:center;padding:40px;color:var(--hint);font-size:14px}
.spin{display:inline-block;width:24px;height:24px;
  border:2.5px solid var(--border);border-top-color:var(--btn);
  border-radius:50%;animation:sp .7s linear infinite;margin-bottom:8px}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px 20px;color:var(--hint)}
.empty-icon{font-size:40px;margin-bottom:10px}

/* Bot nav */
.bot-nav{position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:1px solid var(--border);
  display:flex;z-index:25}
.bnav-btn{flex:1;padding:10px 4px 8px;border:none;
  background:transparent;color:var(--hint);
  font-size:10px;font-weight:500;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px}
.bnav-btn.on{color:var(--btn)}
.bnav-icon{font-size:20px;line-height:1}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-top">
    <h1 id="hdr-title">🛍 Katalog</h1>
    <button class="mode-btn" id="mode-toggle" onclick="toggleMode()">➕ Mahsulot</button>
  </div>
  <div class="search-wrap" id="search-wrap">
    <input class="search" id="search-inp" placeholder="Mahsulot qidiring..." oninput="onSearch(this.value)">
    <span class="search-ic">🔍</span>
  </div>
</div>

<div class="cats" id="cats-row">
  <button class="cat-btn on" data-cat="" onclick="selCat(this,'')">Hammasi</button>
  <button class="cat-btn" data-cat="1" onclick="selCat(this,'1')">🦷 Terapevtik</button>
  <button class="cat-btn" data-cat="2" onclick="selCat(this,'2')">⚙️ Jarrohlik</button>
  <button class="cat-btn" data-cat="3" onclick="selCat(this,'3')">🔬 Zubtexnik</button>
  <button class="cat-btn" data-cat="4" onclick="selCat(this,'4')">🧪 Dezinfeksiya</button>
  <button class="cat-btn" data-cat="5" onclick="selCat(this,'5')">💡 Uskunalar</button>
</div>

<div id="main-content">
  <div class="loading"><div class="spin"></div><br>Yuklanmoqda...</div>
</div>

<!-- FAB — mahsulot qo'shish (faqat seller uchun) -->
<button class="add-fab" id="add-fab" onclick="showAddForm()" style="display:none">+</button>

<!-- Mahsulot detail -->
<div class="overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail" id="detail-content" style="position:relative">
    <button class="det-close" onclick="closeDetailDirect()">✕</button>
  </div>
</div>

<!-- Mahsulot qo'shish form -->
<div class="form-overlay" id="form-overlay">
  <div class="form-sheet">
    <div class="form-title">➕ Mahsulot qo'shish</div>

    <div class="img-area" id="form-img-area" onclick="document.getElementById('form-img-input').click()">
      <span class="img-area-label">📷 Rasm yuklash</span>
      <span class="img-area-hint">ixtiyoriy</span>
      <input type="file" id="form-img-input" accept="image/*" style="display:none" onchange="onFormImg(this)">
    </div>

    <div class="finp-label">Mahsulot nomi *</div>
    <input class="finp" id="f-name" placeholder="Masalan: GC Fuji IX kapsulalar">

    <div class="finp-label">Kategoriya *</div>
    <select class="finp" id="f-cat">
      <option value="1">🦷 Terapevtik</option>
      <option value="2">⚙️ Jarrohlik & Implant</option>
      <option value="3">🔬 Zubtexnik</option>
      <option value="4">🧪 Dezinfeksiya</option>
      <option value="5">💡 Asbob-uskunalar</option>
    </select>

    <div class="finp-label">Narx va birlik *</div>
    <div class="finp-row" style="margin-bottom:12px">
      <input class="finp" id="f-price" type="number" placeholder="Narx" style="flex:2">
      <select class="finp" id="f-unit" style="flex:1">
        <option>dona</option><option>quti</option><option>kg</option>
        <option>litr</option><option>paket</option><option>ml</option>
      </select>
    </div>

    <div class="finp-label">Tavsif</div>
    <textarea class="finp" id="f-desc" rows="2" placeholder="Mahsulot haqida qisqacha..."></textarea>

    <div class="finp-label">Mavjud miqdor</div>
    <input class="finp" id="f-stock" type="number" placeholder="Nechta bor (ixtiyoriy)">

    <button class="fsave" id="f-save" onclick="saveProduct()">💾 Saqlash</button>
    <button class="fcancel" onclick="closeForm()">Bekor qilish</button>
  </div>
</div>

<div class="bot-nav">
  <button class="bnav-btn on" onclick="setView('catalog')">
    <span class="bnav-icon">🛍</span>Katalog
  </button>
  <button class="bnav-btn" id="my-prods-btn" onclick="setView('myproducts')" style="display:none">
    <span class="bnav-icon">📦</span>Mening
  </button>
  <button class="bnav-btn" onclick="setView('orders')">
    <span class="bnav-icon">📋</span>Buyurtmalar
  </button>
</div>

<script>
var tg  = window.Telegram && window.Telegram.WebApp;
if (tg) { tg.ready(); tg.expand(); }

var UID  = 0;
var ROLE = 'clinic';
if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
  UID = tg.initDataUnsafe.user.id;
}
var _qp = new URLSearchParams(window.location.search);
if (!UID) UID = parseInt(_qp.get('uid')||'0')||0;
ROLE = _qp.get('role') || 'clinic';

var curCat    = '';
var curSearch = '';
var curView   = 'catalog';
var allProds  = [];
var formImg   = null;

// Init
(function() {
  if (ROLE === 'seller') {
    document.getElementById('add-fab').style.display = 'flex';
    document.getElementById('my-prods-btn').style.display = 'flex';
    document.getElementById('mode-toggle').style.display = 'block';
  } else {
    document.getElementById('mode-toggle').style.display = 'none';
  }
  loadCatalog();
})();

// ── Katalog yuklash ─────────────────────────────────────────────────────────
function loadCatalog() {
  document.getElementById('main-content').innerHTML =
    '<div class="loading"><div class="spin"></div><br>Yuklanmoqda...</div>';
  fetch('/api/catalog?uid=' + UID + '&cat=' + curCat + '&q=' + encodeURIComponent(curSearch))
    .then(function(r){ return r.json(); })
    .then(function(d) {
      allProds = d.products || [];
      renderCatalog(allProds);
    })
    .catch(function(e) {
      document.getElementById('main-content').innerHTML =
        '<div class="empty"><div class="empty-icon">😕</div>Yuklab bo\'lmadi: ' + e.message + '</div>';
    });
}

function renderCatalog(prods) {
  if (!prods.length) {
    document.getElementById('main-content').innerHTML =
      '<div class="empty"><div class="empty-icon">🔍</div>Mahsulot topilmadi</div>';
    return;
  }
  var html = '<div class="grid">';
  prods.forEach(function(p) {
    var imgHtml = p.photo
      ? '<img src="' + p.photo + '" alt="" onerror="this.parentNode.innerHTML=\'🦷\'">'
      : '🦷';
    var stock = p.stock > 0 ? '<div style="font-size:10px;color:#16a34a;margin-top:2px">✅ Mavjud: '+p.stock+'</div>' : '';
    html += '<div class="pcard" onclick="openDetail('+p.id+')">' +
      '<div class="pimg">' + imgHtml + '</div>' +
      '<div class="pbody">' +
        '<div class="pname">' + esc(p.name) + '</div>' +
        '<div class="pshop">🏪 ' + esc(p.shop_name||'?') + '</div>' +
        stock +
        '<div class="pprice">' + fmt(p.price) + ' <span class="punit">so\'m/' + esc(p.unit) + '</span></div>' +
        '<button class="porder" onclick="event.stopPropagation();quickOrder('+p.id+')">📦 Buyurtma</button>' +
      '</div>' +
    '</div>';
  });
  html += '</div>';
  document.getElementById('main-content').innerHTML = html;
}

// ── Mening mahsulotlarim (seller) ───────────────────────────────────────────
function loadMyProducts() {
  document.getElementById('main-content').innerHTML =
    '<div class="loading"><div class="spin"></div><br>Yuklanmoqda...</div>';
  fetch('/api/catalog/my?uid=' + UID)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      var prods = d.products || [];
      if (!prods.length) {
        document.getElementById('main-content').innerHTML =
          '<div class="empty"><div class="empty-icon">📦</div>Hali mahsulot qo\'shilmagan<br>' +
          '<small style="color:var(--hint)">+ tugmasini bosing</small></div>';
        return;
      }
      var html = '<div style="padding:12px 0">';
      prods.forEach(function(p) {
        var imgHtml = p.photo
          ? '<img src="' + p.photo + '">'
          : '🦷';
        var activeToggle = p.is_active
          ? '<span style="font-size:11px;color:#16a34a">✅ Aktiv</span>'
          : '<span style="font-size:11px;color:#888">⏸ Nofaol</span>';
        html += '<div class="myprod-card">' +
          '<div class="myprod-img">' + imgHtml + '</div>' +
          '<div class="myprod-info">' +
            '<div class="myprod-name">' + esc(p.name) + '</div>' +
            '<div class="myprod-price">' + fmt(p.price) + ' so\'m/' + esc(p.unit) + '</div>' +
            '<div class="myprod-cat">' + esc(p.category||'') + ' · ' + activeToggle + '</div>' +
          '</div>' +
          '<button class="myprod-del" onclick="delProduct('+p.id+')">🗑</button>' +
        '</div>';
      });
      html += '</div>';
      document.getElementById('main-content').innerHTML = html;
    });
}

// ── Detail ───────────────────────────────────────────────────────────────────
function openDetail(pid) {
  fetch('/api/catalog/product/' + pid + '?uid=' + UID)
    .then(function(r){ return r.json(); })
    .then(function(d) {
      if (!d.ok) return;
      var p = d.product;
      var imgHtml = p.photo
        ? '<img src="' + p.photo + '" onerror="this.parentNode.innerHTML=\'🦷\'">'
        : '🦷';
      document.getElementById('detail-content').innerHTML =
        '<button class="det-close" onclick="closeDetailDirect()">✕</button>' +
        '<div class="det-img">' + imgHtml + '</div>' +
        '<div class="det-name">' + esc(p.name) + '</div>' +
        '<div class="det-shop">🏪 ' + esc(p.shop_name||'') + ' · 📍 ' + esc(p.region||'') + '</div>' +
        '<div class="det-price">' + fmt(p.price) + ' so\'m <span style="font-size:14px;font-weight:400;color:var(--hint)">/' + esc(p.unit) + '</span></div>' +
        (p.description ? '<div class="det-desc">' + esc(p.description) + '</div>' : '') +
        (p.stock > 0 ? '<div style="font-size:13px;color:#16a34a;margin-bottom:12px">✅ Mavjud: ' + p.stock + ' ' + esc(p.unit) + '</div>' : '') +
        '<button class="det-buy" onclick="quickOrder(' + p.id + ')">📦 Buyurtma berish</button>';
      document.getElementById('detail-overlay').classList.add('on');
    });
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay')) closeDetailDirect();
}
function closeDetailDirect() {
  document.getElementById('detail-overlay').classList.remove('on');
}

// ── Tez buyurtma ─────────────────────────────────────────────────────────────
function quickOrder(pid) {
  closeDetailDirect();
  // Catalog mahsulotidan to'g'ridan buyurtma — botga ma'lumot yuboramiz
  var prod = allProds.find(function(p){ return p.id === pid; });
  if (!prod) return;
  fetch('/api/catalog/quick_order', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({product_id: pid, user_id: UID})
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    if (d.ok) {
      if (tg) tg.showAlert('✅ Sotuvchiga so\'rov yuborildi!', function(){ });
      else alert('✅ So\'rov yuborildi!');
    } else {
      if (tg) tg.showAlert('❌ ' + (d.error||'Xato'));
      else alert('❌ ' + (d.error||'Xato'));
    }
  });
}

// ── Mahsulot qo'shish ─────────────────────────────────────────────────────────
function showAddForm() {
  formImg = null;
  document.getElementById('f-name').value = '';
  document.getElementById('f-price').value = '';
  document.getElementById('f-desc').value = '';
  document.getElementById('f-stock').value = '';
  document.getElementById('form-img-area').innerHTML =
    '<span class="img-area-label">📷 Rasm yuklash</span>' +
    '<span class="img-area-hint">ixtiyoriy</span>' +
    '<input type="file" id="form-img-input" accept="image/*" style="display:none" onchange="onFormImg(this)">';
  document.getElementById('form-img-area').classList.remove('has');
  document.getElementById('form-overlay').classList.add('on');
}

function closeForm() {
  document.getElementById('form-overlay').classList.remove('on');
}

function onFormImg(inp) {
  var file = inp.files && inp.files[0];
  if (!file || file.size > 5*1024*1024) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    formImg = e.target.result;
    var area = document.getElementById('form-img-area');
    area.classList.add('has');
    area.innerHTML = '<img src="' + formImg + '">' +
      '<input type="file" id="form-img-input" accept="image/*" style="display:none" onchange="onFormImg(this)">';
  };
  reader.readAsDataURL(file);
}

function saveProduct() {
  var name  = document.getElementById('f-name').value.trim();
  var price = parseFloat(document.getElementById('f-price').value);
  var cat   = document.getElementById('f-cat').value;
  var unit  = document.getElementById('f-unit').value;
  var desc  = document.getElementById('f-desc').value.trim();
  var stock = parseInt(document.getElementById('f-stock').value) || 0;

  if (!name || !price) {
    if (tg) tg.showAlert('Nom va narxni kiriting!');
    else alert('Nom va narxni kiriting!');
    return;
  }

  var btn = document.getElementById('f-save');
  btn.disabled = true; btn.textContent = '⏳ Saqlanmoqda...';

  var imgB64 = formImg ? formImg.split(',')[1] : null;

  fetch('/api/catalog/add_product', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      user_id: UID, name: name, price: price,
      category_id: cat, unit: unit,
      description: desc, stock: stock,
      image: imgB64
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(d) {
    btn.disabled = false; btn.textContent = '💾 Saqlash';
    if (d.ok) {
      closeForm();
      loadMyProducts();
      if (tg) tg.showAlert('✅ Mahsulot qo\'shildi!');
    } else {
      if (tg) tg.showAlert('❌ ' + (d.error||'Xato'));
      else alert('❌ ' + (d.error||'Xato'));
    }
  })
  .catch(function(e) {
    btn.disabled = false; btn.textContent = '💾 Saqlash';
    if (tg) tg.showAlert('Tarmoq xatosi: ' + e.message);
  });
}

function delProduct(pid) {
  if (tg) {
    tg.showConfirm("O'chirishni tasdiqlaysizmi?", function(ok) {
      if (ok) _doDelete(pid);
    });
  } else if (confirm("O'chirishni tasdiqlaysizmi?")) {
    _doDelete(pid);
  }
}
function _doDelete(pid) {
  fetch('/api/catalog/del_product', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({product_id: pid, user_id: UID})
  }).then(function(r){ return r.json(); }).then(function(d) {
    if (d.ok) loadMyProducts();
  });
}

// ── View switch ───────────────────────────────────────────────────────────────
function setView(v) {
  curView = v;
  document.querySelectorAll('.bnav-btn').forEach(function(b){ b.classList.remove('on'); });
  event && event.currentTarget && event.currentTarget.classList.add('on');

  var showCats   = v === 'catalog';
  var showSearch = v === 'catalog';
  document.getElementById('cats-row').style.display = showCats ? 'flex' : 'none';
  document.getElementById('search-wrap').style.display = showSearch ? 'block' : 'none';
  document.getElementById('add-fab').style.display = (v === 'myproducts' && ROLE === 'seller') ? 'flex' : 'none';

  if (v === 'catalog') {
    document.getElementById('hdr-title').textContent = '🛍 Katalog';
    loadCatalog();
  } else if (v === 'myproducts') {
    document.getElementById('hdr-title').textContent = '📦 Mening mahsulotlarim';
    loadMyProducts();
  } else if (v === 'orders') {
    document.getElementById('hdr-title').textContent = '📋 Buyurtmalar';
    document.getElementById('main-content').innerHTML =
      '<div class="empty"><div class="empty-icon">📋</div>Buyurtmalar bo\'limi tez orada</div>';
  }
}

function toggleMode() {
  if (curView === 'catalog') setView('myproducts');
  else setView('catalog');
}

function selCat(btn, cat) {
  curCat = cat;
  document.querySelectorAll('.cat-btn').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  loadCatalog();
}

function onSearch(q) {
  curSearch = q;
  clearTimeout(window._st);
  window._st = setTimeout(loadCatalog, 400);
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmt(n){ return Math.round(n||0).toLocaleString(); }
</script>
